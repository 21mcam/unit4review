<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vocabulary Crossword — The Fight for Freedom</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Source+Sans+3:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #faf8f5;
  --surface: #ffffff;
  --ink: #1a1a2e;
  --ink-light: #555568;
  --accent: #b8860b;
  --accent-light: #daa520;
  --accent-bg: #fdf6e3;
  --success: #2d6a4f;
  --success-bg: #d8f3dc;
  --error: #9b2226;
  --error-bg: #fde8e8;
  --border: #e0ddd6;
  --radius: 12px;
  --cell: 32px;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Source Sans 3',sans-serif;background:var(--bg);color:var(--ink);line-height:1.6;padding:20px 12px 80px;max-width:960px;margin:0 auto}
h1{font-family:'Playfair Display',serif;font-weight:900;font-size:1.8rem;text-align:center;margin-bottom:4px}
.subtitle{text-align:center;color:var(--ink-light);font-size:0.95rem;margin-bottom:4px}
.instructions{text-align:center;color:var(--ink-light);font-size:0.85rem;margin-bottom:20px;font-style:italic}

.game-area{display:flex;gap:24px;align-items:flex-start;justify-content:center}
@media(max-width:760px){
  .game-area{flex-direction:column;align-items:center}
  :root{--cell:28px}
}

.grid-scroll{overflow-x:auto;-webkit-overflow-scrolling:touch;padding-bottom:8px}
.grid{display:inline-grid;gap:0;border:2px solid var(--ink);background:var(--ink)}
.cell{width:var(--cell);height:var(--cell);position:relative;background:var(--surface);display:flex;align-items:center;justify-content:center}
.cell.black{background:var(--ink)}
.cell input{width:100%;height:100%;border:1px solid var(--border);text-align:center;font-family:'Source Sans 3',sans-serif;font-size:0.9rem;font-weight:700;text-transform:uppercase;background:transparent;color:var(--ink);outline:none;padding:0}
.cell input:focus{background:var(--accent-bg);border-color:var(--accent)}
.cell .num{position:absolute;top:0px;left:2px;font-size:0.5rem;font-weight:700;color:var(--ink-light);pointer-events:none;z-index:1;line-height:1}
.cell.active-word input{background:var(--accent-bg)}
.cell.correct input{background:var(--success-bg);color:var(--success);border-color:var(--success)}
.cell.wrong input{background:var(--error-bg);color:var(--error);border-color:var(--error)}

.clues-panel{flex:1;min-width:240px;max-width:340px}
.clues-section{margin-bottom:16px}
.clues-section h3{font-family:'Playfair Display',serif;font-size:1rem;margin-bottom:6px;padding-bottom:3px;border-bottom:2px solid var(--accent)}
.clue{padding:5px 8px;border-radius:6px;cursor:pointer;font-size:0.84rem;margin-bottom:3px;transition:all 0.15s;display:flex;gap:6px;line-height:1.4}
.clue:hover{background:var(--accent-bg)}
.clue.active{background:var(--accent-bg);border-left:3px solid var(--accent);font-weight:600}
.clue.solved{opacity:0.45;text-decoration:line-through}
.clue .clue-num{font-weight:700;color:var(--accent);min-width:22px;flex-shrink:0}
.clue .clue-text{color:var(--ink)}

.controls{display:flex;gap:8px;justify-content:center;margin-top:20px;flex-wrap:wrap}
.btn{padding:9px 20px;border-radius:24px;font-family:'Source Sans 3',sans-serif;font-size:0.88rem;font-weight:700;cursor:pointer;border:2px solid var(--border);background:var(--surface);color:var(--ink);transition:all 0.2s}
.btn:hover{border-color:var(--accent);color:var(--accent)}
.btn.primary{background:var(--accent);color:white;border-color:var(--accent)}
.btn.primary:hover{background:var(--accent-light)}

.score-display{text-align:center;margin-top:16px;font-size:1rem;font-weight:700;color:var(--accent);display:none}

.completion{display:none;text-align:center;padding:28px;background:var(--success-bg);border-radius:var(--radius);margin-top:20px}
.completion.show{display:block;animation:popIn 0.5s ease}
.completion h2{font-family:'Playfair Display',serif;color:var(--success);font-size:1.4rem;margin-bottom:6px}
.completion p{color:var(--success);font-size:0.95rem}
@keyframes popIn{from{opacity:0;transform:scale(0.95)}to{opacity:1;transform:scale(1)}}

.hint-toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--ink);color:white;padding:10px 22px;border-radius:24px;font-size:0.88rem;font-weight:600;opacity:0;transition:opacity 0.3s;pointer-events:none;z-index:50;max-width:90%;text-align:center}
.hint-toast.show{opacity:1}
</style>
</head>
<body>

<h1>Vocabulary Crossword</h1>
<p class="subtitle">The Fight for Freedom Unit</p>
<p class="instructions">Click a clue or cell to start typing. Use Tab to jump between words. Click a shared cell twice to switch direction.</p>

<div class="game-area">
  <div class="grid-scroll">
    <div class="grid" id="grid"></div>
  </div>
  <div class="clues-panel">
    <div class="clues-section">
      <h3>Across</h3>
      <div id="acrossClues"></div>
    </div>
    <div class="clues-section">
      <h3>Down</h3>
      <div id="downClues"></div>
    </div>
  </div>
</div>

<div class="controls">
  <button class="btn" onclick="checkAnswers()">Check Answers</button>
  <button class="btn" onclick="giveHint()">Hint</button>
  <button class="btn primary" onclick="revealAll()">Reveal All</button>
</div>

<div class="score-display" id="scoreDisplay"></div>
<div class="completion" id="completion">
  <h2>Puzzle Complete!</h2>
  <p>You nailed all the vocabulary. Nice work!</p>
</div>
<div class="hint-toast" id="hintToast"></div>

<script>
const WORDS = [
  {word:"CLARION",    row:0, col:5,  dir:"down",   num:1,  clue:"A loud, clear trumpet call; something powerfully clear"},
  {word:"LAMENTS",    row:0, col:7,  dir:"down",   num:2,  clue:"Expresses deep grief or sorrow"},
  {word:"NIGH",       row:1, col:0,  dir:"across", num:3,  clue:"Near in distance, time, or relationship"},
  {word:"HITHERTO",   row:1, col:3,  dir:"down",   num:4,  clue:"Until this time; up to this point"},
  {word:"DIREFUL",    row:2, col:9,  dir:"down",   num:5,  clue:"Extremely bad or terrible; dreadful"},
  {word:"ABHORRENCE", row:2, col:12, dir:"across", num:6,  clue:"A feeling of intense hatred or disgust"},
  {word:"BLOCKADE",   row:2, col:13, dir:"down",   num:7,  clue:"A barrier set up to prevent movement of people or goods"},
  {word:"NAUTICAL",   row:2, col:19, dir:"down",   num:8,  clue:"Related to ships, sailing, or navigation on water"},
  {word:"SENTRY",     row:4, col:0,  dir:"down",   num:9,  clue:"A guard stationed to keep watch and control access"},
  {word:"DEPORTMENT", row:5, col:2,  dir:"across", num:10, clue:"A person\u2019s behavior or manner of conducting themselves"},
  {word:"WEAL",       row:6, col:15, dir:"down",   num:11, clue:"Well-being, happiness, or prosperity"},
  {word:"SUFFRAGE",   row:7, col:8,  dir:"across", num:12, clue:"The right to vote in political elections"},
  {word:"REPOSE",     row:8, col:0,  dir:"across", num:13, clue:"A state of rest, calm, or peacefulness"},
  {word:"STEALTHILY", row:9, col:11, dir:"across", num:14, clue:"In a secretive, quiet way to avoid being noticed"},
];

WORDS.sort((a,b) => a.num - b.num);

let maxRow = 0, maxCol = 0;
WORDS.forEach(w => {
  if (w.dir === 'across') { maxRow = Math.max(maxRow, w.row); maxCol = Math.max(maxCol, w.col + w.word.length - 1); }
  else { maxRow = Math.max(maxRow, w.row + w.word.length - 1); maxCol = Math.max(maxCol, w.col); }
});
const ROWS = maxRow + 1;
const COLS = maxCol + 1;

const cellMap = {};
WORDS.forEach(w => {
  for (let i = 0; i < w.word.length; i++) {
    const r = w.dir === 'across' ? w.row : w.row + i;
    const c = w.dir === 'across' ? w.col + i : w.col;
    const key = r + ',' + c;
    if (!cellMap[key]) cellMap[key] = {letter: w.word[i], nums:[], words:[]};
    cellMap[key].words.push(w);
    if (i === 0) cellMap[key].nums.push(w.num);
  }
});

const gridEl = document.getElementById('grid');
gridEl.style.gridTemplateColumns = `repeat(${COLS}, var(--cell))`;
const inputMap = {};

for (let r = 0; r < ROWS; r++) {
  for (let c = 0; c < COLS; c++) {
    const cell = document.createElement('div');
    const key = r + ',' + c;
    if (cellMap[key]) {
      cell.className = 'cell';
      cell.dataset.key = key;
      if (cellMap[key].nums.length > 0) {
        const numEl = document.createElement('span');
        numEl.className = 'num';
        numEl.textContent = cellMap[key].nums.join(',');
        cell.appendChild(numEl);
      }
      const inp = document.createElement('input');
      inp.type = 'text';
      inp.maxLength = 1;
      inp.dataset.key = key;
      inp.addEventListener('focus', () => highlightWord(key));
      inp.addEventListener('input', (e) => onInput(e, r, c));
      inp.addEventListener('keydown', (e) => onKeyDown(e, r, c));
      cell.appendChild(inp);
      inputMap[key] = inp;
    } else {
      cell.className = 'cell black';
    }
    gridEl.appendChild(cell);
  }
}

let activeWord = null;
let lastClickedKey = null;

function highlightWord(key) {
  document.querySelectorAll('.cell').forEach(c => c.classList.remove('active-word'));
  const cellData = cellMap[key];
  if (!cellData) return;

  let word = cellData.words[0];
  if (cellData.words.length > 1 && key === lastClickedKey && activeWord) {
    word = cellData.words.find(w => w !== activeWord) || cellData.words[0];
  } else if (cellData.words.length > 1 && activeWord && cellData.words.includes(activeWord)) {
    word = activeWord;
  }
  lastClickedKey = key;
  activeWord = word;

  for (let i = 0; i < word.word.length; i++) {
    const r = word.dir === 'across' ? word.row : word.row + i;
    const c = word.dir === 'across' ? word.col + i : word.col;
    const el = document.querySelector(`.cell[data-key="${r},${c}"]`);
    if (el) el.classList.add('active-word');
  }
  document.querySelectorAll('.clue').forEach(cl => cl.classList.remove('active'));
  const clueEl = document.getElementById('clue-' + word.num + '-' + word.dir);
  if (clueEl) { clueEl.classList.add('active'); clueEl.scrollIntoView({block:'nearest'}); }
}

function onInput(e, r, c) {
  e.target.value = e.target.value.toUpperCase();
  if (e.target.value && activeWord) moveToNext(r, c);
}
function onKeyDown(e, r, c) {
  if (e.key === 'Backspace' && !e.target.value) { e.preventDefault(); moveToPrev(r, c); }
  else if (e.key === 'Tab') { e.preventDefault(); moveToNextWord(); }
  else if (e.key === 'ArrowRight') { e.preventDefault(); focusCell(r, c+1); }
  else if (e.key === 'ArrowLeft') { e.preventDefault(); focusCell(r, c-1); }
  else if (e.key === 'ArrowDown') { e.preventDefault(); focusCell(r+1, c); }
  else if (e.key === 'ArrowUp') { e.preventDefault(); focusCell(r-1, c); }
}
function moveToNext(r, c) {
  if (!activeWord) return;
  const idx = activeWord.dir === 'across' ? c - activeWord.col : r - activeWord.row;
  if (idx < activeWord.word.length - 1)
    focusCell(activeWord.dir === 'across' ? r : r+1, activeWord.dir === 'across' ? c+1 : c);
}
function moveToPrev(r, c) {
  if (!activeWord) return;
  const idx = activeWord.dir === 'across' ? c - activeWord.col : r - activeWord.row;
  if (idx > 0)
    focusCell(activeWord.dir === 'across' ? r : r-1, activeWord.dir === 'across' ? c-1 : c);
}
function focusCell(r, c) { const inp = inputMap[r+','+c]; if (inp) inp.focus(); }
function moveToNextWord() {
  const idx = activeWord ? WORDS.indexOf(activeWord) : -1;
  const next = WORDS[(idx + 1) % WORDS.length];
  activeWord = next;
  highlightWord(next.row + ',' + next.col);
  focusCell(next.row, next.col);
}

// Clues
const acrossClues = document.getElementById('acrossClues');
const downClues = document.getElementById('downClues');
WORDS.forEach(w => {
  const div = document.createElement('div');
  div.className = 'clue';
  div.id = 'clue-' + w.num + '-' + w.dir;
  div.innerHTML = `<span class="clue-num">${w.num}.</span><span class="clue-text">${w.clue} (${w.word.length})</span>`;
  div.addEventListener('click', () => {
    activeWord = w;
    highlightWord(w.row + ',' + w.col);
    focusCell(w.row, w.col);
  });
  if (w.dir === 'across') acrossClues.appendChild(div);
  else downClues.appendChild(div);
});

function checkAnswers() {
  let correct = 0, total = 0;
  Object.keys(cellMap).forEach(key => {
    const inp = inputMap[key]; const cell = inp.closest('.cell');
    cell.classList.remove('correct', 'wrong'); total++;
    if (inp.value.toUpperCase() === cellMap[key].letter) { cell.classList.add('correct'); correct++; }
    else if (inp.value) { cell.classList.add('wrong'); }
  });
  WORDS.forEach(w => {
    let solved = true;
    for (let i = 0; i < w.word.length; i++) {
      const r = w.dir==='across'?w.row:w.row+i; const c = w.dir==='across'?w.col+i:w.col;
      if (!inputMap[r+','+c] || inputMap[r+','+c].value.toUpperCase() !== w.word[i]) { solved=false; break; }
    }
    const cl = document.getElementById('clue-'+w.num+'-'+w.dir);
    if (cl) cl.classList.toggle('solved', solved);
  });
  const sd = document.getElementById('scoreDisplay');
  sd.style.display = 'block';
  sd.textContent = `${correct} of ${total} letters correct`;
  if (correct === total) document.getElementById('completion').classList.add('show');
}

function giveHint() {
  const targets = activeWord ? [activeWord, ...WORDS.filter(w=>w!==activeWord)] : WORDS;
  for (const w of targets) {
    for (let i = 0; i < w.word.length; i++) {
      const r = w.dir==='across'?w.row:w.row+i; const c = w.dir==='across'?w.col+i:w.col;
      const k = r+','+c;
      if (inputMap[k] && inputMap[k].value.toUpperCase() !== cellMap[k].letter) {
        inputMap[k].value = cellMap[k].letter;
        inputMap[k].closest('.cell').classList.add('correct');
        inputMap[k].closest('.cell').classList.remove('wrong');
        showToast(`Hint: revealed a letter in ${w.num} ${w.dir}`);
        return;
      }
    }
  }
  showToast("No more hints needed!");
}

function revealAll() {
  Object.keys(cellMap).forEach(key => {
    inputMap[key].value = cellMap[key].letter;
    inputMap[key].closest('.cell').classList.add('correct');
    inputMap[key].closest('.cell').classList.remove('wrong');
  });
  WORDS.forEach(w => { const cl = document.getElementById('clue-'+w.num+'-'+w.dir); if (cl) cl.classList.add('solved'); });
  document.getElementById('scoreDisplay').style.display = 'block';
  document.getElementById('scoreDisplay').textContent = 'All answers revealed!';
  document.getElementById('completion').classList.add('show');
}

function showToast(msg) {
  const t = document.getElementById('hintToast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}
</script>
</body>
</html>
