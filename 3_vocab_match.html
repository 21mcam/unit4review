<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vocabulary Match — The Fight for Freedom</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Source+Sans+3:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #faf8f5;
  --surface: #ffffff;
  --ink: #1a1a2e;
  --ink-light: #555568;
  --accent: #b8860b;
  --accent-light: #daa520;
  --accent-bg: #fdf6e3;
  --success: #2d6a4f;
  --success-bg: #d8f3dc;
  --error: #9b2226;
  --error-bg: #fde8e8;
  --border: #e0ddd6;
  --radius: 12px;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Source Sans 3',sans-serif;background:var(--bg);color:var(--ink);line-height:1.6;padding:24px 16px 80px;max-width:820px;margin:0 auto}
h1{font-family:'Playfair Display',serif;font-weight:900;font-size:2rem;text-align:center;margin-bottom:4px}
.subtitle{text-align:center;color:var(--ink-light);font-size:1rem;margin-bottom:8px}
.instructions{text-align:center;color:var(--ink-light);font-size:0.9rem;margin-bottom:24px;font-style:italic}
.student-info{display:flex;gap:12px;flex-wrap:wrap;justify-content:center;margin-bottom:28px}
.student-info input,.student-info select{padding:10px 14px;border:2px solid var(--border);border-radius:8px;font-family:'Source Sans 3',sans-serif;font-size:0.95rem;background:var(--surface);min-width:180px}
.student-info input:focus,.student-info select:focus{outline:none;border-color:var(--accent)}

/* Round indicator */
.round-bar{display:flex;justify-content:center;gap:8px;margin-bottom:24px}
.round-dot{width:32px;height:32px;border-radius:50%;background:var(--border);display:flex;align-items:center;justify-content:center;font-size:0.75rem;font-weight:700;color:white;transition:all 0.3s}
.round-dot.active{background:var(--accent);transform:scale(1.1)}
.round-dot.done{background:var(--success)}

.score-bar{text-align:center;font-weight:700;font-size:1.1rem;margin-bottom:24px;color:var(--accent)}

/* Match area */
.match-area{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:28px}
@media(max-width:580px){.match-area{grid-template-columns:1fr;gap:14px}}
.column-header{font-weight:700;font-size:0.85rem;text-transform:uppercase;letter-spacing:0.05em;color:var(--ink-light);margin-bottom:10px;text-align:center}
.terms-col,.defs-col{display:flex;flex-direction:column;gap:8px}
.term-card,.def-card{padding:14px 16px;border-radius:var(--radius);border:2px solid var(--border);cursor:pointer;transition:all 0.2s;font-size:0.95rem;user-select:none;background:var(--surface)}
.term-card:hover,.def-card:hover{border-color:var(--accent-light)}
.term-card.selected{border-color:var(--accent);background:var(--accent-bg);box-shadow:0 0 0 3px rgba(184,134,11,0.15)}
.def-card.selected{border-color:var(--accent);background:var(--accent-bg);box-shadow:0 0 0 3px rgba(184,134,11,0.15)}
.term-card.matched{border-color:var(--success);background:var(--success-bg);cursor:default;opacity:0.8}
.def-card.matched{border-color:var(--success);background:var(--success-bg);cursor:default;opacity:0.8}
.term-card.wrong,.def-card.wrong{border-color:var(--error);background:var(--error-bg);animation:shake 0.4s}
.term-card .word{font-weight:700;font-size:1.05rem}
.term-card .context{font-size:0.82rem;color:var(--ink-light);margin-top:4px;font-style:italic}
.matched-label{font-size:0.78rem;color:var(--success);font-weight:600;margin-top:6px}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}

.feedback-toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);padding:12px 28px;border-radius:24px;font-weight:600;font-size:0.95rem;z-index:50;opacity:0;transition:opacity 0.3s;pointer-events:none}
.feedback-toast.show{opacity:1}
.feedback-toast.correct{background:var(--success);color:white}
.feedback-toast.wrong{background:var(--error);color:white}

/* Final results */
.final-results{display:none;text-align:center;background:var(--surface);border-radius:var(--radius);padding:40px 28px;box-shadow:0 4px 24px rgba(0,0,0,0.1)}
.final-results.show{display:block;animation:popIn 0.4s ease}
@keyframes popIn{from{opacity:0;transform:scale(0.95)}to{opacity:1;transform:scale(1)}}
.final-results h2{font-family:'Playfair Display',serif;font-size:1.8rem;margin-bottom:8px}
.big-score{font-family:'Playfair Display',serif;font-size:3.5rem;font-weight:900;margin:20px 0}
.big-score.great{color:var(--success)}
.big-score.ok{color:var(--accent)}
.big-score.low{color:var(--error)}
.final-msg{color:var(--ink-light);font-size:1.05rem;margin-bottom:20px}
.retry-btn{background:var(--accent);color:white;border:none;padding:14px 36px;border-radius:24px;font-family:'Source Sans 3',sans-serif;font-size:1rem;font-weight:700;cursor:pointer;margin-top:12px}
.retry-btn:hover{background:var(--accent-light)}
.status-msg{font-size:0.85rem;color:var(--ink-light);margin-top:12px}
</style>
</head>
<body>

<script>
const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyoUDRQx5VkV5hniOx-RgiwvqwBtbz8-Bn2kh6PIIE4UYXSM1pL_Lj2wXYPwlEKZdBHkQ/exec";
</script>

<h1>Vocabulary Match</h1>
<p class="subtitle">The Fight for Freedom Unit</p>
<p class="instructions">Click a word, then click its matching definition. Complete all 3 rounds!</p>

<div class="student-info">
  <input type="text" id="studentName" placeholder="Your Name (First & Last)">
  <select id="studentPeriod">
    <option value="">Period...</option>
    <option>Period 1</option><option>Period 2</option><option>Period 3</option>
    <option>Period 4</option><option>Period 5</option><option>Period 6</option>
    <option>Period 7</option><option>Period 8</option>
  </select>
</div>

<div class="round-bar" id="roundBar"></div>
<div class="score-bar" id="scoreBar">Score: 0 / 0</div>

<div class="match-area" id="matchArea">
  <div>
    <div class="column-header">Word</div>
    <div class="terms-col" id="termsCol"></div>
  </div>
  <div>
    <div class="column-header">Definition</div>
    <div class="defs-col" id="defsCol"></div>
  </div>
</div>

<div class="final-results" id="finalResults">
  <h2>All Rounds Complete!</h2>
  <div class="big-score" id="bigScore"></div>
  <div class="final-msg" id="finalMsg"></div>
  <div class="status-msg" id="statusMsg"></div>
  <button class="retry-btn" onclick="location.reload()">Try Again</button>
</div>

<div class="feedback-toast" id="toast"></div>

<script>
// All vocabulary from both passage sets
const allVocab = [
  // Passage Set 1
  {word:"Nautical",def:"Related to ships, sailing, or navigation on water",context:"Passage 1: \u201CHe also learned how to read nautical maps.\u201D"},
  {word:"Navigator",def:"A person who directs the course of a ship or vehicle",context:"Passage 1: \u201CHe became an excellent sailor and navigator.\u201D"},
  {word:"Blockade",def:"A barrier set up to prevent movement of people or goods",context:"Passage 1: \u201CBeyond the harbor was a blockade of Northern ships.\u201D"},
  {word:"Sentry",def:"A guard stationed to keep watch and control access",context:"Passage 1: \u201C. . . and the sentry let the steamer pass.\u201D"},
  {word:"Fortifications",def:"Military structures built for defense against attack",context:"Passage 1: \u201CHe had memorized the location . . . of Confederate fortifications.\u201D"},
  {word:"Accomplice",def:"A person who helps another commit a wrongful act",context:"Passage 2: \u201CI\u2019ll be in no sense accomplice or help in this cruel business.\u201D"},
  {word:"Hitherto",def:"Until this time; up to this point",context:"Passage 2: \u201C. . . an entirely altered being from the . . . creature she had been hitherto.\u201D"},
  {word:"Negligently",def:"In a careless, inattentive manner",context:"Passage 2: \u201C. . . his long curls falling negligently around his unconscious face.\u201D"},
  {word:"Stealthily",def:"In a secretive, quiet way to avoid being noticed",context:"Passage 2: \u201CShe rose and crept stealthily away.\u201D"},
  {word:"Verandah",def:"A roofed, open porch along the outside of a building",context:"Passage 2: \u201C. . . a door in her room which led into the outer verandah.\u201D"},
  // Passage Set 2 (Poem)
  {word:"Clarion",def:"A loud, clear trumpet call; something powerfully clear",context:"Poem: \u201CFor her his voice, a fearless clarion, rung.\u201D"},
  {word:"Imprecations",def:"Spoken curses or expressions of anger",context:"Poem: \u201CAnd their torrent wrath in furious imprecations o\u2019er him broke.\u201D"},
  {word:"Laments",def:"Expresses deep grief or sorrow",context:"Poem: \u201CAnd Ethiopia . . . laments the passing of her noblest born.\u201D"},
  {word:"Direful",def:"Extremely bad or terrible; dreadful",context:"Poem: \u201CHe was her champion thro\u2019 direful years.\u201D"},
  {word:"Weal",def:"Well-being, happiness, or prosperity",context:"Poem: \u201CAnd held her weal all other ends above.\u201D"},
  {word:"Nigh",def:"Near in distance, time, or relationship",context:"Poem: \u201CShe knows thy guardian spirit will be nigh.\u201D"},
  // Passage 2 (Douglass autobiography)
  {word:"Repose",def:"A state of rest, calm, or peacefulness",context:"Douglass: \u201COnce resolved, I felt a certain degree of repose.\u201D"},
  {word:"Insolent",def:"Showing rude, disrespectful boldness",context:"Douglass: \u201C. . . the insolent answers made to his reproaches.\u201D"},
  {word:"Deportment",def:"A person\u2019s behavior or manner of conducting themselves",context:"Douglass: \u201C. . . the sulky deportment the week after.\u201D"},
  {word:"Abhorrence",def:"A feeling of intense hatred or disgust",context:"Douglass: \u201C. . . that slavery which had been my abhorrence from childhood.\u201D"},
  {word:"Hindered",def:"Made it difficult for someone to do something; held back",context:"Douglass: \u201CThe daughter is hindered from escaping.\u201D"},
  {word:"Suffrage",def:"The right to vote in political elections",context:"Grammar passage: \u201CThe U.S. women\u2019s suffrage movement.\u201D"},
];

// Shuffle helper
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

// Divide into rounds
const shuffled = shuffle(allVocab);
const roundSize = Math.ceil(shuffled.length / 3);
const rounds = [
  shuffled.slice(0, roundSize),
  shuffled.slice(roundSize, roundSize * 2),
  shuffled.slice(roundSize * 2)
];
const totalRounds = rounds.length;

let currentRound = 0;
let totalScore = 0;
let totalAttempted = 0;
let roundMissed = [];
let selectedTerm = null;
let selectedDef = null;
let matchedCount = 0;

// Render round dots
const roundBar = document.getElementById('roundBar');
for (let i = 0; i < totalRounds; i++) {
  const dot = document.createElement('div');
  dot.className = 'round-dot' + (i === 0 ? ' active' : '');
  dot.textContent = i + 1;
  roundBar.appendChild(dot);
}

function showToast(msg, type) {
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.className = 'feedback-toast show ' + type;
  setTimeout(() => toast.classList.remove('show'), 1200);
}

function updateScore() {
  document.getElementById('scoreBar').textContent = `Score: ${totalScore} / ${totalAttempted}`;
}

function renderRound() {
  const terms = rounds[currentRound];
  const termsCol = document.getElementById('termsCol');
  const defsCol = document.getElementById('defsCol');
  termsCol.innerHTML = '';
  defsCol.innerHTML = '';
  matchedCount = 0;
  selectedTerm = null;
  selectedDef = null;

  // Shuffle terms and defs independently
  const shuffledTerms = shuffle(terms);
  const shuffledDefs = shuffle(terms);

  shuffledTerms.forEach((v, i) => {
    const card = document.createElement('div');
    card.className = 'term-card';
    card.dataset.word = v.word;
    card.innerHTML = `<div class="word">${v.word}</div><div class="context">${v.context}</div>`;
    card.addEventListener('click', () => clickTerm(card));
    termsCol.appendChild(card);
  });

  shuffledDefs.forEach((v, i) => {
    const card = document.createElement('div');
    card.className = 'def-card';
    card.dataset.word = v.word;
    card.textContent = v.def;
    card.addEventListener('click', () => clickDef(card));
    defsCol.appendChild(card);
  });
}

function clickTerm(card) {
  if (card.classList.contains('matched')) return;
  document.querySelectorAll('.term-card').forEach(c => c.classList.remove('selected'));
  card.classList.add('selected');
  selectedTerm = card;
  tryMatch();
}

function clickDef(card) {
  if (card.classList.contains('matched')) return;
  document.querySelectorAll('.def-card').forEach(c => c.classList.remove('selected'));
  card.classList.add('selected');
  selectedDef = card;
  tryMatch();
}

function tryMatch() {
  if (!selectedTerm || !selectedDef) return;

  totalAttempted++;
  const termWord = selectedTerm.dataset.word;
  const defWord = selectedDef.dataset.word;

  if (termWord === defWord) {
    // Correct match
    totalScore++;
    selectedTerm.classList.remove('selected');
    selectedDef.classList.remove('selected');
    selectedTerm.classList.add('matched');
    selectedDef.classList.add('matched');
    selectedTerm.innerHTML += `<div class="matched-label">\u2713 Matched!</div>`;
    showToast('\u2713 Correct!', 'correct');
    matchedCount++;

    if (matchedCount === rounds[currentRound].length) {
      setTimeout(nextRound, 1000);
    }
  } else {
    // Wrong match
    roundMissed.push(termWord);
    selectedTerm.classList.add('wrong');
    selectedDef.classList.add('wrong');
    showToast('\u2717 Try again!', 'wrong');
    setTimeout(() => {
      selectedTerm.classList.remove('wrong', 'selected');
      selectedDef.classList.remove('wrong', 'selected');
      selectedTerm = null;
      selectedDef = null;
    }, 600);
    return;
  }

  selectedTerm = null;
  selectedDef = null;
  updateScore();
}

function nextRound() {
  currentRound++;
  const dots = document.querySelectorAll('.round-dot');
  dots.forEach((d, i) => {
    d.classList.remove('active');
    if (i < currentRound) d.classList.add('done');
    if (i === currentRound) d.classList.add('active');
  });
  if (currentRound < totalRounds) {
    renderRound();
  } else {
    // All done — mark last dot as done
    dots[dots.length - 1].classList.add('done');
    dots[dots.length - 1].classList.remove('active');
    showFinalResults();
  }
}

function showFinalResults() {
  document.getElementById('matchArea').style.display = 'none';
  document.getElementById('scoreBar').style.display = 'none';
  const panel = document.getElementById('finalResults');
  panel.classList.add('show');

  const pct = Math.round((totalScore / totalAttempted) * 100);
  const bigScore = document.getElementById('bigScore');
  bigScore.textContent = pct + '%';
  bigScore.className = 'big-score ' + (pct >= 80 ? 'great' : pct >= 60 ? 'ok' : 'low');
  document.getElementById('finalMsg').textContent =
    `You matched ${totalScore} of ${totalAttempted} attempts correctly (${allVocab.length} total words).` +
    (pct >= 90 ? ' Outstanding work!' : pct >= 70 ? ' Nice job — keep reviewing!' : ' Keep studying these words!');

  // Send to Google Sheets
  const name = document.getElementById('studentName').value.trim();
  const period = document.getElementById('studentPeriod').value;
  const statusMsg = document.getElementById('statusMsg');

  if (name && period && GOOGLE_SCRIPT_URL && GOOGLE_SCRIPT_URL !== "YOUR_GOOGLE_APPS_SCRIPT_URL_HERE") {
    const uniqueMissed = [...new Set(roundMissed)];
    fetch(GOOGLE_SCRIPT_URL, {
      method: 'POST',
      mode: 'no-cors',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({
        type: 'vocab',
        name: name,
        period: period,
        score: totalScore,
        total: totalAttempted,
        missed: uniqueMissed.join(', ') || 'None'
      })
    }).then(() => {
      statusMsg.textContent = 'Results saved!';
    }).catch(() => {
      statusMsg.textContent = 'Could not save results. Show this screen to your teacher.';
    });
  } else if (!name || !period) {
    statusMsg.textContent = 'Enter your name and period above, then try again to save results.';
  }
}

// Start!
renderRound();
updateScore();
</script>
</body>
</html>
